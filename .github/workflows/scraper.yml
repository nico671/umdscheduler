name: Hourly Testudo Scraper

on:
  schedule:
    # Runs at minute 0 past every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to trigger the script manually from the GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' # Matches your pyproject.toml requirement

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run Scraper
        working-directory: ./backend/scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scraper.py